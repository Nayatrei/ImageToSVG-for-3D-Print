                    <!-- Raster Tab Content -->
                    <div id="tab-raster" class="export-panel hidden raster-v2">

                        <!-- Empty state shown when no image is loaded -->
                        <div id="raster-empty-state" class="raster-card-dropzone" onclick="document.getElementById('file-input').click()">
                            <div class="raster-card-dropzone-inner">
                                <svg class="raster-card-dropzone-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <p class="raster-card-dropzone-title">Drop image here</p>
                                <p class="raster-card-dropzone-sub">PNG, JPG, SVG, WEBP, GIF, BMP, AVIF &amp; more</p>
                                <div class="raster-card-dropzone-divider"><span>or</span></div>
                                <button class="raster-card-dropzone-btn btn-primary" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                                    </svg>
                                    Import from Device
                                </button>
                            </div>
                        </div>

                        <!-- Original image preview (shown when image is loaded, replaces dropzone) -->
                        <div id="raster-original-preview" class="raster-original-preview hidden" onclick="document.getElementById('file-input').click()" title="Click to load a different image">
                            <img id="raster-original-img" class="raster-original-img" alt="Original">
                            <div class="raster-original-overlay">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                                </svg>
                                <span>Replace Image</span>
                            </div>
                        </div>

                        <!-- Content shown when image is loaded -->
                        <div id="raster-content" class="hidden raster-loaded-layout">

                            <!-- ① Channel Preview -->
                            <div class="raster-preview-block">
                                <!-- RGBA Segmented Control -->
                                <div class="raster-channel-seg-wrap">
                                    <div class="rgba-channel-tabs raster-channel-seg">
                                        <button class="rgba-channel-tab red active" data-channel="red">
                                            <span class="rchan-dot"></span>R
                                        </button>
                                        <button class="rgba-channel-tab green" data-channel="green">
                                            <span class="rchan-dot"></span>G
                                        </button>
                                        <button class="rgba-channel-tab blue" data-channel="blue">
                                            <span class="rchan-dot"></span>B
                                        </button>
                                        <button class="rgba-channel-tab alpha" data-channel="alpha">
                                            <span class="rchan-dot"></span>A
                                        </button>
                                    </div>
                                </div>
                                <!-- Canvas -->
                                <div class="rgba-preview-container raster-canvas-frame">
                                    <canvas id="rgba-preview-canvas" class="rgba-preview-canvas"></canvas>
                                </div>
                            </div>

                            <!-- ② Image Metadata Strip -->
                            <div class="raster-info-strip">
                                <div class="raster-info-item">
                                    <span class="raster-info-label">Dimensions</span>
                                    <span id="original-dims" class="raster-info-value">—</span>
                                </div>
                                <span class="raster-info-sep" aria-hidden="true">·</span>
                                <div class="raster-info-item">
                                    <span class="raster-info-label">Aspect</span>
                                    <span id="original-aspect" class="raster-info-value">—</span>
                                </div>
                                <span class="raster-info-sep" aria-hidden="true">·</span>
                                <div class="raster-info-item">
                                    <span class="raster-info-label">Format</span>
                                    <span id="original-format" class="raster-info-value">—</span>
                                </div>
                                <span class="raster-info-sep" aria-hidden="true">·</span>
                                <div class="raster-info-item">
                                    <span class="raster-info-label">File Size</span>
                                    <span id="original-file-size" class="raster-info-value">—</span>
                                </div>
                            </div>

                            <!-- ③ Output Scale -->
                            <div class="raster-control-block">
                                <div class="raster-control-header">
                                    <span class="raster-control-title">Output Scale</span>
                                </div>
                                <div class="raster-chips-row">
                                    <button class="resize-chip" data-scale="25">25%</button>
                                    <button class="resize-chip" data-scale="50">50%</button>
                                    <button class="resize-chip" data-scale="100">100%</button>
                                    <button class="resize-chip" data-scale="200">200%</button>
                                    <button class="resize-chip" data-scale="300">300%</button>
                                </div>
                                <div class="raster-custom-row">
                                    <span class="raster-custom-label">Custom</span>
                                    <input id="resize-custom" type="number" min="1" max="500" class="raster-custom-input" placeholder="100">
                                    <span class="raster-custom-unit">%</span>
                                    <button id="apply-custom-resize" class="raster-apply-btn">Apply</button>
                                </div>
                            </div>

                            <!-- ④ Export Size Preview -->
                            <div class="raster-export-block">
                                <div class="raster-export-header-row">
                                    <span class="raster-export-at-label">Exporting at</span>
                                    <span id="export-size-target" class="raster-export-dims-val">—</span>
                                    <span id="export-scale-display" class="raster-export-pct-badge">—</span>
                                </div>
                                <div class="raster-fmt-cards">
                                    <div class="raster-fmt-card">
                                        <div class="raster-fmt-name">JPG</div>
                                        <div class="raster-fmt-desc">Smallest</div>
                                        <div id="size-est-jpg" class="raster-fmt-size">—</div>
                                    </div>
                                    <div class="raster-fmt-card raster-fmt-featured">
                                        <div class="raster-fmt-name">PNG</div>
                                        <div class="raster-fmt-desc">Lossless</div>
                                        <div id="size-est-png" class="raster-fmt-size">—</div>
                                    </div>
                                    <div class="raster-fmt-card">
                                        <div class="raster-fmt-name">TGA</div>
                                        <div class="raster-fmt-desc">Raw</div>
                                        <div id="size-est-tga" class="raster-fmt-size">—</div>
                                    </div>
                                </div>
                            </div>

                        </div><!-- end raster-content -->
                    </div><!-- end tab-raster -->

<footer id="download-footer" data-tab-footer="raster" class="hidden raster-dl-footer raster-v2">
    <div class="raster-dl-grid">
        <!-- JPG -->
        <div class="raster-dl-item">
            <button id="save-resized-jpg-btn" class="raster-dl-btn btn-secondary" disabled>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                </svg>
                Save as JPG
            </button>
            <span class="raster-dl-hint">Smallest · No alpha</span>
        </div>
        <!-- PNG (primary) -->
        <div class="raster-dl-item raster-dl-featured">
            <button id="save-resized-png-btn" class="raster-dl-btn btn-primary" disabled>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                </svg>
                Save as PNG
            </button>
            <label class="raster-dl-alpha-toggle">
                <input id="preserve-alpha-png" type="checkbox" class="accent-blue-500 cursor-pointer" checked>
                <span>Include alpha</span>
            </label>
        </div>
        <!-- TGA -->
        <div class="raster-dl-item">
            <button id="save-resized-tga-btn" class="raster-dl-btn btn-secondary" disabled>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                </svg>
                Save as TGA
            </button>
            <label class="raster-dl-alpha-toggle">
                <input id="preserve-alpha-tga" type="checkbox" class="accent-blue-500 cursor-pointer" checked>
                <span>Include alpha</span>
            </label>
        </div>
    </div>
</footer>
