                    <div id="tab-raster" class="export-panel hidden">

                                <svg class="raster-card-dropzone-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                        <div id="raster-content" class="hidden">

                        <div class="output-grid two-col">
                            <!-- RGBA Preview (Left Column) -->
                            <div class="output-card">
                                <div class="output-card-header">
                                    <h4 class="output-card-title">Channel Preview</h4>
                                </div>

                                        <button class="rgba-channel-tab blue" data-channel="blue">B</button>
                                        <button class="rgba-channel-tab alpha" data-channel="alpha">A</button>

                                    <div class="rgba-preview-container">
                                        <canvas id="rgba-preview-canvas" class="rgba-preview-canvas"></canvas>

                                </div>
                            </div>

                            <!-- Dimensions & Resize (Right Column) -->
                            <div class="output-card">
                                <div class="output-card-header">
                                    <h4 class="output-card-title">Export Settings</h4>
                                </div>
                                <div class="output-card-content">

                                        <div class="grid grid-cols-2 gap-2 text-xs">

                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-500">Aspect:</span>
                                                <span id="original-aspect" class="font-mono text-gray-300">—</span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-500">Format:</span>
                                                <span id="original-format" class="font-mono text-gray-300">—</span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-500">File Size:</span>
                                                <span id="original-file-size" class="font-mono text-gray-300">—</span>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Resize Options -->

                                            <button id="apply-custom-resize" class="btn-secondary text-xs font-semibold py-1 px-3 rounded-md">Apply</button>
                                        </div>
                                    </div>

                                    <!-- Result Preview -->
                                    <div class="p-3 bg-gray-800 rounded-lg border border-gray-700">
                                        <div class="text-xs font-semibold text-gray-400 mb-2">Export Size</div>
                                        <div class="flex items-center justify-center gap-2 text-sm mb-3">
                                            <span id="export-size-target" class="font-mono text-blue-400 font-semibold">—</span>
                                            <span id="export-scale-display" class="text-xs text-gray-500">(100%)</span>
                                        </div>
                                        <div class="grid grid-cols-3 gap-3 text-xs">
                                            <div class="text-center p-2 bg-gray-900 rounded">
                                                <div class="text-gray-400 font-semibold mb-1">JPG</div>
                                                <div id="size-est-jpg" class="font-mono text-gray-300">—</div>
                                            </div>
                                            <div class="text-center p-2 bg-gray-900 rounded">
                                                <div class="text-gray-400 font-semibold mb-1">PNG</div>
                                                <div id="size-est-png" class="font-mono text-gray-300">—</div>
                                            </div>
                                            <div class="text-center p-2 bg-gray-900 rounded">
                                                <div class="text-gray-400 font-semibold mb-1">TGA</div>
                                                <div id="size-est-tga" class="font-mono text-gray-300">—</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        </div><!-- end raster-content -->
                    </div><!-- end tab-raster -->

        </div>
    </div>
